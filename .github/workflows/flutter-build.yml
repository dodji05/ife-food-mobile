name: 📱 Flutter — Build APK Debug

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: 🏗️ Build APK Android
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # ── 2. Java 17 (requis pour Gradle / Android SDK) ─────────────────────
      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── 3. Flutter stable ──────────────────────────────────────────────────
      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      # ── 4. Fichiers secrets ────────────────────────────────────────────────
      - name: 🔐 Write google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > android/app/google-services.json

      # ── 5. Dépendances ─────────────────────────────────────────────────────
      - name: 📦 Install dependencies
        run: flutter pub get

      # ── 6. Analyse statique (non bloquante) ────────────────────────────────
      - name: 🔍 Flutter analyze
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      # ── 7. Build APK debug ─────────────────────────────────────────────────
      - name: 🏗️ Build APK debug
        run: |
          flutter build apk --debug \
            --dart-define=API_URL=https://ifeapi.associationireni.org/api/v1 \
            --dart-define=WS_URL=https://ifeapi.associationireni.org

      # ── 7. Upload artifact ─────────────────────────────────────────────────
      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ife-food-debug-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14

      # ── 8. Résumé ──────────────────────────────────────────────────────────
      - name: ✅ Build successful
        if: success()
        run: |
          echo "✅ APK généré avec succès !"
          echo "📥 Téléchargeable dans GitHub → Actions → ce workflow → Artifacts"

      - name: ❌ Build failed
        if: failure()
        run: echo "⚠️ Le build a échoué. Consultez les logs ci-dessus."
