name: 📱 Flutter — Build APK Debug

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: 🏗️ Build APK Android
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # ── 2. Java 17 (requis pour Gradle / Android SDK) ─────────────────────
      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── 3. Flutter stable ──────────────────────────────────────────────────
      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
          cache: true

      # google-services.json est désormais versionné dans le repo
      # (clés publiques, safe à committer). Plus d'injection par secret —
      # cela évitait les mismatch silencieux qui cassaient l'init Firebase
      # (getToken null → fcmToken jamais enregistré).

      # ── 5. Dépendances ─────────────────────────────────────────────────────
      - name: 📦 Install dependencies
        run: flutter pub get

      # ── 6. Génération icônes launcher + splash ─────────────────────────────
      - name: 🖼️ Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: 💫 Generate native splash
        run: dart run flutter_native_splash:create

      # ── 7. Analyse statique (non bloquante) ────────────────────────────────
      - name: 🔍 Flutter analyze
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      # ── 8. Build APK debug ─────────────────────────────────────────────────
      - name: 🏗️ Build APK debug
        run: |
          flutter build apk --debug \
            --target-platform android-arm64 \
            --dart-define=API_URL=https://api.ifefood.bj/api/v1 \
            --dart-define=WS_URL=https://api.ifefood.bj

      # ── 9. Upload artifact ─────────────────────────────────────────────────
      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ife-food-debug-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14

      # ── 10. Résumé ─────────────────────────────────────────────────────────
      - name: ✅ Build successful
        if: success()
        run: |
          echo "✅ APK généré avec succès !"
          echo "📥 Téléchargeable dans GitHub → Actions → ce workflow → Artifacts"

      - name: ❌ Build failed
        if: failure()
        run: echo "⚠️ Le build a échoué. Consultez les logs ci-dessus."